name: Release PR Automation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  automate-release-pr:
    if: startsWith(github.event.pull_request.head.ref, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Update PR body with included pull requests
        id: included-prs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const compareResponse = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${pr.base.ref}...${pr.head.ref}`,
              per_page: 100
            });

            const commitList = compareResponse.data.commits || [];
            const uniquePrMap = new Map();

            for (const commit of commitList) {
              const prsResponse = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: commit.sha
              });

              for (const linkedPr of prsResponse.data) {
                if (linkedPr.number === pr.number) {
                  continue;
                }
                if (linkedPr.merged_at) {
                  uniquePrMap.set(linkedPr.number, linkedPr);
                }
              }
            }

            const includedPrs = [...uniquePrMap.values()].sort((a, b) => a.number - b.number);
            const includedPrLines = includedPrs.length
              ? includedPrs.map((includedPr) => {
                  return `- #${includedPr.number} ${includedPr.title} (@${includedPr.user.login})`;
                })
              : ["- 関連するマージ済みPRはまだ見つかっていません。"];

            const markerStart = "<!-- included-prs:start -->";
            const markerEnd = "<!-- included-prs:end -->";
            const sectionBody = [
              markerStart,
              "### マージ対象PR一覧",
              ...includedPrLines,
              markerEnd
            ].join("\n");

            const currentBody = pr.body || "";
            const markerRegex = /<!-- included-prs:start -->[\s\S]*?<!-- included-prs:end -->/m;
            const updatedBody = markerRegex.test(currentBody)
              ? currentBody.replace(markerRegex, sectionBody)
              : [currentBody.trim(), sectionBody].filter(Boolean).join("\n\n");

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body: updatedBody
            });

            core.setOutput("included_pr_lines", includedPrLines.join("\n"));

      - name: Create or update draft release
        uses: actions/github-script@v7
        env:
          INCLUDED_PR_LINES: ${{ steps.included-prs.outputs.included_pr_lines }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const releasePrefix = "release/";
            const tagName = pr.head.ref.startsWith(releasePrefix)
              ? pr.head.ref.slice(releasePrefix.length)
              : pr.head.ref;
            const releaseName = `Draft Release ${pr.head.ref}`;
            const releaseBody = [
              `このドラフトは #${pr.number} (${pr.head.ref} -> ${pr.base.ref}) 向けに自動作成されています。`,
              "",
              "## マージ対象PR",
              process.env.INCLUDED_PR_LINES || "- 取得できませんでした。"
            ].join("\n");

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName
              });

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tagName,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease: true,
                target_commitish: pr.head.ref
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease: true,
                target_commitish: pr.head.ref
              });
            }
